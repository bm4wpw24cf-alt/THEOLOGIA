<style>
:root{--bg:#f8f6f2;--white:#fff;--ink:#1d1d1d;--muted:#666;--gold:#b08d57;--line:#e6dfd5;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--ink);line-height:1.7}
nav{position:sticky;top:0;z-index:100;background:rgba(248,246,242,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:20px 50px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'EB Garamond',serif;font-size:2.2rem} .logo span{color:var(--gold)}
nav ul{display:flex;gap:30px;list-style:none} nav a{text-decoration:none;color:var(--ink)}
.hero{max-width:1400px;margin:auto;display:grid;grid-template-columns:1fr 1fr;align-items:center}
.hero-text{padding:80px}
.eyebrow{color:var(--gold);letter-spacing:2px;font-size:.8rem;margin-bottom:15px}
.hero h1{font-family:'EB Garamond',serif;font-size:5.5rem;font-weight:400;line-height:1}
.hero h1 em{color:var(--gold);font-style:italic}
.hero p{max-width:520px;color:var(--muted);margin:25px 0}
.btn{display:inline-block;background:var(--gold);color:#fff;padding:14px 24px;text-decoration:none}
.hero-image img{width:100%;height:100%;object-fit:cover;display:block}
section{max-width:1280px;margin:auto;padding:70px 40px}
.label{color:var(--gold);letter-spacing:2px;margin-bottom:25px;font-size:.85rem}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.card{background:#fff;border:1px solid var(--line);padding:30px;text-align:center}
.card h3{font-family:'EB Garamond',serif;font-size:1.6rem;margin-top:8px}
.columns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:30px}
.panel{background:#fff;border:1px solid var(--line);padding:25px}
.panel h2{font-family:'EB Garamond',serif;margin-bottom:15px}
.panel li{margin:10px 0}
.quote{background:#171513;color:#fff;padding:80px 30px;text-align:center}
.quote blockquote{font-family:'EB Garamond',serif;font-size:2.7rem;font-style:italic}
.quote p{margin-top:15px;color:#d3b07c}
.about{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:20px}
.box{background:#fff;border:1px solid var(--line);padding:24px}
footer{text-align:center;padding:30px;border-top:1px solid var(--line)}
@media(max-width:900px){.hero,.columns,.about{grid-template-columns:1fr} .grid{grid-template-columns:1fr 1fr} .hero h1{font-size:3.5rem} nav ul{display:none} .hero-text{padding:40px 25px} section{padding:50px 20px}}
